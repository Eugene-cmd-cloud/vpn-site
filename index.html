<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VPN links hub</title>
  <style>
    :root{
      --bg:#07111f; --card:#0d1c33; --card2:#132544; --line:#27436f; --text:#eef4ff; --muted:#b7c6e6; --accent:#7aa8ff; --accent2:#8de0ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 90% 10%, #123460 0%, var(--bg) 45%) fixed;
      color:var(--text);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 56px}
    .hero,.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--card),var(--card2));border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,.24)}
    .hero{padding:28px;margin-bottom:22px}
    .badge{display:inline-flex;gap:10px;align-items:center;padding:10px 14px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:rgba(255,255,255,.03)}
    .dot{width:12px;height:12px;border-radius:50%;background:var(--accent)}
    h1{font-size:clamp(36px,5vw,64px);line-height:1.02;margin:22px 0 12px}
    p.lead{font-size:clamp(18px,2vw,20px);line-height:1.55;color:var(--muted);max-width:900px}
    .grid{display:grid;grid-template-columns:1.25fr .95fr;gap:22px}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}
    .card{padding:22px}
    h2{font-size:20px;margin:0 0 16px}
    .group-title{font-size:17px;margin:22px 0 12px;color:#dce8ff}
    .item{border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;background:rgba(255,255,255,.02)}
    .item h3{margin:0 0 8px;font-size:20px}
    .item p{margin:0 0 12px;color:var(--muted);line-height:1.45}
    .row{display:flex;flex-wrap:wrap;gap:10px}
    .btn{
      appearance:none; border:1px solid var(--line); background:#183257; color:var(--text);
      padding:12px 16px; border-radius:16px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
      font-weight:600;
    }
    .btn.secondary{background:transparent}
    .muted{color:var(--muted)}
    code.url{
      display:block;white-space:nowrap;overflow:auto;margin-top:10px;padding:12px 14px;border-radius:14px;
      background:rgba(0,0,0,.18);border:1px solid var(--line);color:#dfe8ff;font-size:13px
    }
    ul{padding-left:18px;margin:10px 0 0}
    li{margin:8px 0;color:var(--muted);line-height:1.45}
    .footer{margin-top:18px;color:var(--muted);font-size:14px}
    .ok{color:var(--accent2)}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge"><span class="dot"></span><span>GitHub Pages links manager</span></div>
      <h1 id="site-title">VPN links hub</h1>
      <p class="lead" id="site-subtitle">Загрузка…</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Ссылки</h2>
        <div id="content"></div>
      </div>

      <div class="card">
        <h2>Как этим пользоваться</h2>
        <ul id="help-list"></ul>
        <div class="footer">
          <p><strong>Как добавлять новые ссылки:</strong></p>
          <ol class="muted">
            <li>Загрузи новый файл в папку <span class="ok">subs/</span>.</li>
            <li>Открой <span class="ok">data/links.json</span>.</li>
            <li>Добавь новый объект в нужную группу.</li>
            <li>Сохрани commit — сайт сам обновится.</li>
          </ol>
        </div>
      </div>
    </section>
  </div>

<script>
function basePath() {
  const path = window.location.pathname;
  return path.endsWith('/') ? path : path.replace(/[^/]+$/, '');
}
function fullUrl(rel) {
  return new URL(rel, window.location.origin + basePath()).toString();
}
async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const old = btn.textContent;
    btn.textContent = 'Скопировано';
    setTimeout(() => btn.textContent = old, 1200);
  } catch {
    alert(text);
  }
}
function render(data){
  document.getElementById('site-title').textContent = data.title || 'VPN links hub';
  document.getElementById('site-subtitle').textContent = data.subtitle || '';
  const content = document.getElementById('content');
  content.innerHTML = '';
  (data.groups || []).forEach(group => {
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = group.name;
    content.appendChild(title);

    (group.items || []).forEach(item => {
      const url = fullUrl(item.path);
      const box = document.createElement('div');
      box.className = 'item';
      box.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.description || ''}</p>
        <div class="row">
          <a class="btn" href="${url}" target="_blank" rel="noopener">Открыть файл</a>
          <button class="btn secondary copy-url">Скопировать ссылку</button>
        </div>
        <code class="url">${url}</code>
      `;
      box.querySelector('.copy-url').addEventListener('click', (e)=>copyText(url, e.currentTarget));
      content.appendChild(box);
    });
  });

  const help = document.getElementById('help-list');
  help.innerHTML = '';
  (data.help || []).forEach(line => {
    const li = document.createElement('li');
    li.textContent = line;
    help.appendChild(li);
  });
}
fetch(fullUrl('data/links.json'))
  .then(r => r.json())
  .then(render)
  .catch(err => {
    document.getElementById('site-subtitle').textContent = 'Не удалось загрузить data/links.json';
    console.error(err);
  });
</script>
</body>
</html>
